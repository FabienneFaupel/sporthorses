<div class="feed-container">

  <!-- Heu Card -->
  <mat-card class="feed-card">
    <h2>Heu</h2>
    <div class="feed-value">
        {{ hayCurrent }} / {{ hayMax }}
    </div>
    <mat-progress-bar
      mode="determinate"
      [value]="(hayCurrent / hayMax) * 100">
    </mat-progress-bar>
  </mat-card>

  <!-- Stroh Card -->
  <mat-card class="feed-card">
    <h2>Stroh</h2>
    <div class="feed-value">{{ strawCurrent }} / {{ strawMax }}</div>
    <mat-progress-bar
      mode="determinate"
      color="warn"
      [value]="(strawCurrent / strawMax) * 100">
    </mat-progress-bar>
  </mat-card>

</div>

<!-- Buttons unter den Cards -->
<div class="feed-actions">
  <button mat-raised-button color="primary" >➕ Hinzufügen</button>
  <button mat-raised-button color="accent" >➖ Verbrauch</button>
</div>

<!-- Verlauf / History -->
<div *ngFor="let log of feedLog" class="feed-log-card">
  <div class="feed-header">
    
    <h3>{{ log.type | titlecase }}</h3>
    <span class="action-icon" [ngClass]="log.action">
      {{ log.action === 'add' ? '+' : '−' }}
    </span>
  </div>

  <hr [ngClass]="log.action">

  <p class="history-date">{{ log.date | date:'dd.MM.yyyy' }}</p>

  <div class="feed-amount">
    <strong>{{ log.amount }}</strong> Ballen
  </div>

  <span class="feed-action">
    {{ log.action === 'add' ? 'Eingelagert' : 'Verbraucht' }}
  </span>
</div>
