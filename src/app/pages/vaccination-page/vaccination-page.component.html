
<div class="btn-box">
  <button mat-raised-button color="primary" (click)="openVaccinationDialog()">
    ➕ Impfung hinzufügen
  </button>
</div>


<mat-tab-group>
  <mat-tab *ngFor="let horse of horses" label="{{ horse.name }}">
    <div class="horse-card">
      <h2>🐴 {{ horse.name }} ({{ horse.age }} Jahre, {{ horse.gender }})</h2>

      <div *ngFor="let vac of horse.vaccinations; let i = index" class="vaccination-card" [ngClass]="vac.status">
        <div class="vac-card-header">
          <p><strong>💉 {{ vac.type }}</strong></p>
          <div class="info-card-actions">
              <button mat-icon-button color="primary" (click)="editVaccination(horse._id!, i, vac)" >
                <mat-icon>edit</mat-icon>
              </button>
              <button mat-icon-button color="warn" (click)="deleteVaccination(horse._id!, i)" >
               <mat-icon>delete</mat-icon>
              </button>
          </div>
        </div>
        <hr>
        <p>📅 Datum: {{ vac.date }}</p>
        <p>🔁 Nächste: {{ vac.next }}</p>
        <p>Status: <span class="status">{{ vac.status }}</span></p>
      </div>
    </div>
  </mat-tab>
</mat-tab-group>
