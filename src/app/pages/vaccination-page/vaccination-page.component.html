<!-- impfungen-page.component.html -->
<div class="p-6">
  <h1 class="text-2xl font-bold mb-4">Impfungen</h1>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <mat-card *ngFor="let pferd of pferde" class="shadow-lg">
      <img mat-card-image [src]="pferd.bild" [alt]="pferd.name" />
      <mat-card-title>{{ pferd.name }}</mat-card-title>

      <div class="overflow-x-auto mt-2">
        <table mat-table [dataSource]="pferd.impfungen" class="w-full">
          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef> Impfung </th>
            <td mat-cell *matCellDef="let impf">{{ impf.name }}</td>
          </ng-container>

          <ng-container matColumnDef="datum">
            <th mat-header-cell *matHeaderCellDef> Letzte </th>
            <td mat-cell *matCellDef="let impf">{{ impf.datum }}</td>
          </ng-container>

          <ng-container matColumnDef="naechste">
            <th mat-header-cell *matHeaderCellDef> Nächste </th>
            <td mat-cell *matCellDef="let impf">{{ impf.naechste }}</td>
          </ng-container>

          <ng-container matColumnDef="status">
            <th mat-header-cell *matHeaderCellDef> Status </th>
            <td mat-cell *matCellDef="let impf">
              <span
                [ngClass]="{
                  'text-green-600 font-bold': impf.status === 'Geimpft',
                  'text-red-600 font-bold': impf.status === 'Fällig'
                }"
              >
                {{ impf.status }}
              </span>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="['name', 'datum', 'naechste', 'status']"></tr>
          <tr mat-row *matRowDef="let row; columns: ['name', 'datum', 'naechste', 'status']"></tr>
        </table>
      </div>
    </mat-card>
  </div>
</div>
