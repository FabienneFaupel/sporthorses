<div class="landing-container">

    <div class="title">
        <h1>SportHorses</h1>
    </div>

    <div class="quick-actions">
        <button mat-fab class="action-btn" color="primary" routerLink="/vaccination">
            <mat-icon>vaccines</mat-icon>
        </button>

        <button mat-fab class="action-btn" color="accent">
            <mat-icon>build</mat-icon>
        </button>

        <button mat-fab class="action-btn" color="warn">
            <mat-icon>restaurant</mat-icon>
        </button>
    </div>

    <div class="row">
        <div class="col" *ngFor="let horse of horses">
            <app-landing-horse-box 
                [horseName]="horse.horseName" 
                [horseAge]="horse.horseAge" 
                [horseBirth]="horse.horseBirth"
                [horseBreed]="horse.horseBreed"
                [horseImage]="horse.image">
            </app-landing-horse-box>


        </div>

        <div class="col">
            <div class="add-horse">
                <p>ein weiteres Pferd hinzufügen</p>
                <section>
                    <button mat-fab class="action-btn" color="primary">
                        <mat-icon>add</mat-icon>
                    </button>
                </section>
            </div>
        </div>

    </div>

</div>
