<div class="landing-container">

    <mat-progress-bar *ngIf="loading" mode="indeterminate"></mat-progress-bar>


    <div class="title">
        <h1>SportHorses</h1>
    </div>

    <div class="quick-actions">
        <button mat-fab class="action-btn" color="primary" routerLink="/vaccination">
            <mat-icon>vaccines</mat-icon>
        </button>

        <button mat-fab class="action-btn" color="accent" routerLink="/farrier">
            <mat-icon>build</mat-icon>
        </button>

        <button mat-fab class="action-btn" color="warn" routerLink="/feed">
            <mat-icon>restaurant</mat-icon>
        </button>
    </div>


    <div class="row">
        <div class="col" *ngFor="let horse of horses; let i = index">
            <a [routerLink]="['/horses', horse._id]" class="box-link">
            <app-landing-horse-box 
                [horseName]="horse.name" 
                [horseAge]="dataService.getDisplayAge(horse)"
                [horseBirth]="horse.birth"
                [horseGender]="horse.gender"
                [horseBreed]="horse.breed"
                
                >
            </app-landing-horse-box>
            </a>

        </div>

        <div class="col">
            <div class="add-horse">
                <p>Ein weiteres Pferd hinzufügen</p>
                <section>
                    <button mat-fab class="action-btn" color="primary" routerLink="/addHorse">
                        <mat-icon>add</mat-icon>
                    </button>
                </section>
            </div>
        </div>

    </div>

</div>
