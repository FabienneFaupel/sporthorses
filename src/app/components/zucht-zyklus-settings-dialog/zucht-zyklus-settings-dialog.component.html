<div class="zyklus-dialog">
  <h2>Zyklus bearbeiten</h2>

  <mat-form-field appearance="outline">
    <mat-label>Rosse-Zyklus in Tagen</mat-label>
    <input
      matInput
      type="number"
      min="1"
      [(ngModel)]="form.heatCycleDays"
    />
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Trächtigkeit in Tagen</mat-label>
    <input
      matInput
      type="number"
      min="1"
      [(ngModel)]="form.pregnancyDays"
    />
  </mat-form-field>

  <p class="hint">
    Diese Werte werden für die automatische Berechnung der nächsten Rosse und des erwarteten Fohlen-Termins genutzt.
  </p>

  <div class="dialog-actions">
    <button mat-button (click)="close()">Abbrechen</button>

    <button
      mat-raised-button
      class="save-button"
      [disabled]="!isValid"
      (click)="save()"
    >
      Speichern
    </button>
  </div>
</div>
