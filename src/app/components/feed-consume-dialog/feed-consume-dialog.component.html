<h2 mat-dialog-title>Verbrauch eingeben</h2>


<mat-dialog-content>

    <mat-form-field appearance="fill">
        <mat-label>Futterart</mat-label>
        <mat-select [(ngModel)]="type" name="type">
            <mat-option value="heu">Heu</mat-option>
            <mat-option value="stroh">Stroh</mat-option>
        </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
        <mat-label>Datum</mat-label>
        <input matInput [matDatepicker]="picker" [(ngModel)]="date" />
        <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
        <mat-datepicker #picker></mat-datepicker>
    </mat-form-field>


    <mat-form-field appearance="outline">
        <mat-label>Menge in Ballen</mat-label>
        <input matInput type="number" 
        [(ngModel)]="amount"
        name="amount"
        #amountCtrl="ngModel"
         [min]="1"
         [max]="maxAmount"
         required />
        <mat-error *ngIf="amountCtrl.errors?.['required']">Pflichtfeld</mat-error>
        <mat-error *ngIf="amountCtrl.errors?.['min']">Menge muss ≥ 1 sein</mat-error>
        <mat-error *ngIf="amountCtrl.errors?.['max']">
        Maximal {{ maxAmount }} Ballen verfügbar
        </mat-error>
        </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
    <button mat-button (click)="cancel()">Abbrechen</button>
    <button mat-raised-button color="warn" (click)="confirm()" [disabled]="amountCtrl.invalid || !type || !date">Verbrauchen</button>
</mat-dialog-actions>
