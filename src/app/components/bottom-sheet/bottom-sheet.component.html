<div class="sheet">
  <div class="sheet-grabber" aria-hidden="true"></div>

  <mat-nav-list class="sheet-list">
    <a
      mat-list-item
      class="sheet-item"
      *ngFor="let i of items"
      (click)="go(i.link)"
      [attr.aria-label]="i.label"
    >
      <mat-icon matListItemIcon class="sheet-icon">{{ i.icon }}</mat-icon>
      <div matListItemTitle class="sheet-label">{{ i.label }}</div>
    </a>
  </mat-nav-list>
</div>
