<h2 mat-dialog-title>Einkauf hinzufügen</h2>

<mat-dialog-content>

    <mat-form-field appearance="fill">
        <mat-label>Futterart</mat-label>
        <mat-select [(ngModel)]="type">
            <mat-option value="heu">Heu</mat-option>
            <mat-option value="stroh">Stroh</mat-option>
        </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
        <mat-label>Datum</mat-label>
        <input matInput [matDatepicker]="picker" [(ngModel)]="date" />
        <mat-datepicker-toggle matSuffix [for]="picker" [(ngModel)]="date"></mat-datepicker-toggle>
        <mat-datepicker #picker></mat-datepicker>
    </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Menge in Ballen</mat-label>
    <input matInput type="number" [(ngModel)]="amount" min="1" />
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Preis in €</mat-label>
    <input matInput type="number" [(ngModel)]="price" min="0" step="0.01" />
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Abbrechen</button>
  <button mat-raised-button color="primary" (click)="confirm()">Hinzufügen</button>
</mat-dialog-actions>
