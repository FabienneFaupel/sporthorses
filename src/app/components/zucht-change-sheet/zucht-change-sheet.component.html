<div class="cycle-sheet">
  <div class="sheet-handle"></div>

  <div class="sheet-header">
    <h3>Zuchtzyklen</h3>

    <button mat-icon-button (click)="close()">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <div class="empty-cycle-state" *ngIf="cycles.length === 0">
    <div class="empty-icon">
      <mat-icon>favorite</mat-icon>
    </div>

    <h4>Noch kein Zuchtzyklus</h4>
    <p>Lege einen neuen Zyklus für dieses Pferd an.</p>
  </div>

  <div class="cycle-list" *ngIf="cycles.length > 0">
    <button
      class="cycle-item"
      *ngFor="let cycle of cycles"
      [class.active]="cycle._id === activeCycleId"
      (click)="selectCycle(cycle.id)"
    >
      <mat-icon class="check-icon" *ngIf="cycle.id === activeCycleId">check</mat-icon>
      <div class="placeholder-icon" *ngIf="cycle.id !== activeCycleId"></div>

      <div class="cycle-text">
        <strong>{{ cycle.year }}</strong>
        <p>{{ cycle.status }}</p>
      </div>

      <button
        mat-icon-button
        class="delete-cycle"
        (click)="deleteCycle(cycle._id, $event)"
      >
        <mat-icon>delete</mat-icon>
      </button>
    </button>
  </div>

  <div class="create-cycle-box">
    <h4>Neuen Zyklus anlegen</h4>

    <div class="year-row">
      <button mat-icon-button (click)="form.year = form.year - 1">
        <mat-icon>remove</mat-icon>
      </button>

      <strong>{{ form.year }}</strong>

      <button mat-icon-button (click)="form.year = form.year + 1">
        <mat-icon>add</mat-icon>
      </button>
    </div>

    <button mat-raised-button class="save-cycle" (click)="createCycle()">
      <mat-icon>add</mat-icon>
      Zyklus {{ form.year }} anlegen
    </button>
  </div>
</div>
