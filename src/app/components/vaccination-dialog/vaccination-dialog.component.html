<h2 mat-dialog-title>Neue Impfung</h2>

<mat-dialog-content>
  <form class="vaccination-form">
    <!-- Pferde-Auswahl -->
    <mat-form-field appearance="outline" class="form-field">
      <mat-label>Pferd(e)</mat-label>
      <mat-select multiple>
        <mat-option *ngFor="let horse of data.horses" [value]="horse.name">
          {{ horse.name }}
        </mat-option>
      </mat-select>
    </mat-form-field>

    <!-- Impfungsart -->
    <mat-form-field appearance="outline" class="form-field">
      <mat-label>Impfung</mat-label>
      <mat-select>
        <mat-option value="Influenza">Influenza</mat-option>
        <mat-option value="Tetanus">Tetanus</mat-option>
        <mat-option value="Herpes">Herpes</mat-option>
      </mat-select>
    </mat-form-field>

    <!-- Datum -->
    <mat-form-field appearance="outline" class="form-field">
      <mat-label>Impfdatum</mat-label>
      <input matInput [matDatepicker]="picker">
      <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-datepicker #picker></mat-datepicker>
    </mat-form-field>

    <!-- Status -->
    <mat-form-field appearance="outline" class="form-field">
      <mat-label>Status</mat-label>
      <mat-select>
        <mat-option value="geimpft">Geimpft</mat-option>
        <mat-option value="überfällig">Überfällig</mat-option>
        <mat-option value="geplant">Geplant</mat-option>
      </mat-select>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="close()">Abbrechen</button>
  <button mat-raised-button color="primary" (click)="close()">Speichern</button>
</mat-dialog-actions>
