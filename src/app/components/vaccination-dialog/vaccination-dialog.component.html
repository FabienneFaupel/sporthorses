<h2 mat-dialog-title>{{ data?.mode === 'edit' ? 'Impfung bearbeiten' : 'Neue Impfung' }}</h2>

<mat-dialog-content>
  <form class="vaccination-form">
    <!-- Pferd(e) -->
    <mat-form-field appearance="outline" class="form-field">
      <mat-label>{{ data?.mode === 'edit' ? 'Pferd' : 'Pferd(e)' }}</mat-label>
      <mat-select
        [multiple]="data?.mode !== 'edit'"
        [(ngModel)]="selectedHorseIds"
        name="horseIds"
        required>
        <mat-option *ngFor="let horse of data.horses" [value]="horse._id || horse.name">
          {{ horse.name }}
        </mat-option>
      </mat-select>
    </mat-form-field>

    <!-- Impfungsart -->
    <mat-form-field appearance="outline" class="form-field">
      <mat-label>Impfung</mat-label>
      <mat-select [(ngModel)]="vaccineType" name="type" required>
        <mat-option value="Influenza">Influenza</mat-option>
        <mat-option value="Tetanus">Tetanus</mat-option>
        <mat-option value="Herpes">Herpes</mat-option>
      </mat-select>
    </mat-form-field>

    <!-- Datum (heute vorbefüllt) -->
    <mat-form-field appearance="outline" class="form-field">
      <mat-label>Impfdatum</mat-label>
      <input matInput [matDatepicker]="picker" [(ngModel)]="vaccinationDate" name="date" required>
      <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-datepicker #picker></mat-datepicker>
    </mat-form-field>

    <!-- Status (default geimpft) -->
    <mat-form-field appearance="outline" class="form-field">
      <mat-label>Status</mat-label>
      <mat-select [(ngModel)]="status" name="status" required>
        <mat-option value="geimpft">Geimpft</mat-option>
        <mat-option value="überfällig">Überfällig</mat-option>
        <mat-option value="geplant">Geplant</mat-option>
      </mat-select>
    </mat-form-field>

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="close()">Abbrechen</button>
  <button mat-raised-button color="primary" (click)="save()" [disabled]="isDisabled()">
    Speichern
  </button>
</mat-dialog-actions>
