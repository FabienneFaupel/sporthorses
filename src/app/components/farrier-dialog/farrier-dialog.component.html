<h2 mat-dialog-title>Neuer Beschlag</h2>

<mat-dialog-content>
  <form class="farrier-form">

    <!-- Pferde-Auswahl -->
   
        <mat-form-field appearance="outline" class="form-field">
            <mat-label>Pferd</mat-label>
            <mat-select [(ngModel)]="selectedHorseId" name="horse" required>
              <mat-option *ngFor="let h of data.horses" [value]="h._id">
                {{ h.name }}
              </mat-option>
            </mat-select>
        </mat-form-field>
   

    
    <!-- Datum -->
     
    <mat-form-field appearance="outline" class="form-field">
      <mat-label>Schmieddatum</mat-label>
      <input matInput [matDatepicker]="picker" [(ngModel)]="treatmentDate" name="treatmentDate" required>
      <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-datepicker #picker></mat-datepicker>
    </mat-form-field>

   

    

     <!-- Behandlungsart -->
   <div class="treatment-toggle">
      <mat-button-toggle-group 
        [(ngModel)]="treatmentType"
        (ngModelChange)="onTreatmentTypeChange($event)" 
        name="treatmentType" 
        aria-label="Behandlungsart auswählen" 
        class="full-width"
        >
        <mat-button-toggle value="beschlagen">Beschlagen</mat-button-toggle>
        <mat-button-toggle value="ausgeschnitten">Ausgeschnitten</mat-button-toggle>
      </mat-button-toggle-group>
    </div>

    <!-- Hufe Auswahl -->
    <div class="hooves-container">
      <div class="hoof" *ngFor="let hoof of hooves; let i = index">
        <!-- Kürzel links -->
        <span class="hoof-label">{{ hoof.short }}</span>

        <!-- Kreis als Icon -->
        <div 
          class="hoof-circle" 
          [class.selected]="selectedHooves[i]"
          [class.beschlagen]="selectedHooves[i] && treatmentType === 'beschlagen'"
          [class.ausgeschnitten]="selectedHooves[i] && treatmentType === 'ausgeschnitten'" 
          (click)="toggleHoof(i)">
        </div>

        <!-- Nur bei "beschlagen": Toggle für Eisen -->
        <mat-button-toggle-group 
          *ngIf="treatmentType === 'beschlagen' && selectedHooves[i]" 
          [(ngModel)]="hoofIron[i]" 
          name="iron-{{i}}" 
          class="iron-toggle" 
          >
          <mat-button-toggle value="neu">Neu</mat-button-toggle>
          <mat-button-toggle value="alt">Alt</mat-button-toggle>
        </mat-button-toggle-group>
      </div>
    </div>

     <!-- Kommentar (optional) -->
<mat-form-field appearance="outline" class="form-field">
  <mat-label>Kommentar (optional)</mat-label>
  <textarea
    matInput
    [(ngModel)]="comment"
    name="comment"
    placeholder="z. B. Pferd war sehr brav"
    rows="3">
  </textarea>
</mat-form-field>


  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="close()">Abbrechen</button>
  <button 
    mat-raised-button 
    color="primary" 
    (click)="save()" 
    [disabled]="isSaveDisabled()">
    Speichern
  </button>
</mat-dialog-actions>
