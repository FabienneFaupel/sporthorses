<h2 mat-dialog-title>Eintrag hinzufügen</h2>

<div mat-dialog-content class="content">
  <div class="subtitle">
    {{ data.horseName }} • {{ data.slot }}
  </div>

  <!-- Produkt -->
  <mat-form-field appearance="outline" class="full">
    <mat-label>Produkt</mat-label>
    <mat-select [formControl]="form.controls.productKey">
      <mat-option *ngFor="let p of products" [value]="p.key">
        <img class="opt-img" [src]="p.iconPath" [alt]="p.label">
        {{ p.label }}
      </mat-option>
    </mat-select>
  </mat-form-field>

  <!-- Einheit / Art -->
  <mat-form-field appearance="outline" class="full" *ngIf="selectedProduct">
    <mat-label>Art / Einheit</mat-label>
    <mat-select [formControl]="form.controls.unitKey">
      <mat-option *ngFor="let u of selectedProduct!.units" [value]="u.key">
        {{ u.label }}
      </mat-option>
    </mat-select>
  </mat-form-field>

  <!-- Presets (¼, ½, ¾, 1) -->
  <mat-form-field appearance="outline" class="full" *ngIf="amountMode === 'preset'">
    <mat-label>Menge</mat-label>
    <mat-select [formControl]="form.controls.preset">
      <mat-option *ngFor="let pr of selectedUnit!.presets" [value]="pr.value">
        {{ pr.label }}
      </mat-option>
    </mat-select>
    <mat-hint *ngIf="selectedUnit?.hint">{{ selectedUnit?.hint }}</mat-hint>

    
  </mat-form-field>

  <!-- Zahlenfeld (g, kg, ml, l, Anzahl) -->
  <mat-form-field appearance="outline" class="full" *ngIf="amountMode === 'number'">
    <mat-label>Menge</mat-label>
    <input
      matInput
      type="number"
      [formControl]="form.controls.amountNum"
      [placeholder]="'z.B. 250 ' + unitLabel"
      [min]="selectedUnit?.min ?? 0"
      [step]="selectedUnit?.step ?? 1"
    >
    <mat-hint>Einheit: {{ unitLabel }}</mat-hint>
  </mat-form-field>
</div>

<div mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Abbrechen</button>
  <button mat-raised-button color="primary" (click)="save()" [disabled]="isSaveDisabled()">
    Hinzufügen
  </button>
</div>
