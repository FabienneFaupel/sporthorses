<div class="horse-box">
  
  <div class="horse-picture">
      <img [src]="horseImage" alt="{{ horseName }}">
  </div>
  <div class="horse-info effect">
        <h3>{{ horseName }}</h3>
        <hr>
        <p>Alter: {{ horseAge }} Jahre</p>
        <p>Geburtsdatum: {{ horseBirth }}</p>
        <p>Rasse: {{ horseBreed }}</p>
  </div>
</div>
