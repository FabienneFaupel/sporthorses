<div class="horse-box">
  
  <div class="horse-picture">
      <img src="/images/horse.svg" alt="{{ horseName }}">
  </div>
  <div class="horse-info effect">
        <h3>{{ horseName }}</h3>
        <hr>
        <p>Alter: {{ horseAge }} Jahre</p>
        <p>Geschlecht: {{ horseGender }}</p>
        <p *ngIf="horseBirth">Geburtsdatum: {{ formatBirth(horseBirth) }}</p>

  </div>
</div>
